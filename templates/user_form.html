{{define "title"}}{{if .User}}Edit User{{else}}New User{{end}}{{end}}
{{define "content"}}
<form method="POST" action="{{if .User}}/users/edit/{{.User.ID}}{{else}}/users/new{{end}}">
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-6">
    <h2 class="text-xl font-bold text-gray-900">{{if .User}}Edit User{{else}}New User{{end}}</h2>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
      <input type="text" name="name" value="{{if .User}}{{.User.Name}}{{end}}" placeholder="e.g. John" required autofocus
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div class="flex gap-3 pt-2">
      <a href="/users" class="flex-1 text-center bg-gray-200 text-gray-700 font-medium py-2.5 rounded-lg hover:bg-gray-300 transition">
        Cancel
      </a>
      <button type="submit" class="flex-1 bg-blue-600 text-white font-medium py-2.5 rounded-lg hover:bg-blue-700 transition">
        {{if .User}}Save Changes{{else}}Create User{{end}}
      </button>
    </div>
  </div>
</form>
{{end}}
