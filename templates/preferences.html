{{define "title"}}Preferences{{end}}
{{define "content"}}
<form method="POST" action="/preferences">
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-6">
    <h2 class="text-xl font-bold text-gray-900">Preferences</h2>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Name</label>
      <div class="flex gap-2">
        <select name="user_id" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
          <option value="0">-- None --</option>
          {{range .Users}}
          <option value="{{.ID}}" {{if eq $.UserID .ID}}selected{{end}}>{{.Name}}</option>
          {{end}}
        </select>
        <a href="/users" class="inline-flex items-center px-4 py-2 rounded-lg bg-gray-100 text-gray-700 text-sm font-medium hover:bg-gray-200 transition">
          Manage Users
        </a>
      </div>
      <p class="text-xs text-gray-400 mt-1">Select a user or go to Manage Users to add one.</p>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Preferred Currency</label>
      <select name="currency" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="MYR" {{if eq .Currency "MYR"}}selected{{end}}>Malaysian Ringgit (RM)</option>
        <option value="USD" {{if eq .Currency "USD"}}selected{{end}}>US Dollar ($)</option>
        <option value="JPY" {{if eq .Currency "JPY"}}selected{{end}}>Japanese Yen (¥)</option>
        <option value="CNY" {{if eq .Currency "CNY"}}selected{{end}}>Chinese Yuan (¥)</option>
        <option value="THB" {{if eq .Currency "THB"}}selected{{end}}>Thai Baht (฿)</option>
        <option value="EUR" {{if eq .Currency "EUR"}}selected{{end}}>Euro (€)</option>
        <option value="GBP" {{if eq .Currency "GBP"}}selected{{end}}>British Pound (£)</option>
        <option value="SGD" {{if eq .Currency "SGD"}}selected{{end}}>Singapore Dollar (S$)</option>
        <option value="KRW" {{if eq .Currency "KRW"}}selected{{end}}>South Korean Won (₩)</option>
        <option value="AUD" {{if eq .Currency "AUD"}}selected{{end}}>Australian Dollar (A$)</option>
        <option value="CAD" {{if eq .Currency "CAD"}}selected{{end}}>Canadian Dollar (C$)</option>
        <option value="INR" {{if eq .Currency "INR"}}selected{{end}}>Indian Rupee (₹)</option>
        <option value="VND" {{if eq .Currency "VND"}}selected{{end}}>Vietnamese Dong (₫)</option>
        <option value="PHP" {{if eq .Currency "PHP"}}selected{{end}}>Philippine Peso (₱)</option>
        <option value="IDR" {{if eq .Currency "IDR"}}selected{{end}}>Indonesian Rupiah (Rp)</option>
        <option value="HKD" {{if eq .Currency "HKD"}}selected{{end}}>Hong Kong Dollar (HK$)</option>
        <option value="TWD" {{if eq .Currency "TWD"}}selected{{end}}>New Taiwan Dollar (NT$)</option>
      </select>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit" class="flex-1 bg-blue-600 text-white font-medium py-2.5 rounded-lg hover:bg-blue-700 transition">
        Save Preferences
      </button>
      <a href="/" class="flex-1 text-center bg-gray-200 text-gray-700 font-medium py-2.5 rounded-lg hover:bg-gray-300 transition">
        Cancel
      </a>
    </div>
  </div>
</form>
{{end}}
