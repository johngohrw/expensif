{{define "base"}}
<!DOCTYPE html>
<html {{if .DarkMode}}class="dark"{{end}}>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{template "title" .}} | Expensif</title>
<script>
tailwind.config = { darkMode: 'class' }
</script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100">
<div class="max-w-3xl mx-auto px-4 py-8">
  <nav class="flex gap-6 mb-8 pb-4 border-b border-gray-200 dark:border-gray-700">
    <a href="/" class="font-semibold {{if eq .Active "list"}}text-gray-900 dark:text-gray-100{{else}}text-blue-600 hover:text-blue-800{{end}}">Expenses</a>
    <a href="/daily" class="font-semibold {{if eq .Active "daily"}}text-gray-900 dark:text-gray-100{{else}}text-blue-600 hover:text-blue-800{{end}}">Daily View</a>
    <a href="/expenses/new" class="font-semibold {{if eq .Active "add"}}text-gray-900 dark:text-gray-100{{else}}text-blue-600 hover:text-blue-800{{end}}">+ New Expense</a>
    <a href="/preferences" class="font-semibold {{if eq .Active "prefs"}}text-gray-900 dark:text-gray-100{{else}}text-blue-600 hover:text-blue-800{{end}} ml-auto">Preferences</a>
  </nav>
  {{if .Flash}}
  <div class="mb-6 px-4 py-3 rounded-lg {{if .FlashError}}bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200{{else}}bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200{{end}}">
    {{.Flash}}
  </div>
  {{end}}
  {{template "content" .}}
</div>
</body>
</html>
{{end}}
