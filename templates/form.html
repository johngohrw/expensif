{{define "form"}}
<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
  <h2 class="text-xl font-bold mb-6 text-gray-900">{{.Title}}</h2>
  <div class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Amount</label>
      <input type="number" name="amount" step="0.01" value="{{if .Expense}}{{printf "%.2f" .Expense.Amount}}{{end}}" placeholder="0.00" required autofocus
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
      <input type="text" name="description" value="{{if .Expense}}{{.Expense.Description}}{{end}}" placeholder="e.g. lunch with team" required
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
      <input type="text" id="cat-input" name="category" value="{{if .Expense}}{{.Expense.Category}}{{end}}" placeholder="e.g. groceries" required
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      <div id="cat-pills" class="flex flex-wrap gap-2 mt-2"></div>
      <script>
        (function(){
          var container = document.getElementById('cat-pills');
          var input = document.getElementById('cat-input');
          if(!container) return;
          fetch('/api/categories').then(function(r){ return r.json(); }).then(function(json){
            var cats = json.data || [];
            if(cats.length === 0) return;
            cats.forEach(function(cat){
              var btn = document.createElement('button');
              btn.type = 'button';
              btn.textContent = cat;
              btn.className = 'text-xs font-medium bg-blue-50 text-blue-700 px-3 py-1 rounded-full hover:bg-blue-100 transition';
              btn.onclick = function(){ input.value = cat; };
              container.appendChild(btn);
            });
          });
        })();
      </script>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Currency</label>
      <select name="currency" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        {{$sel := .Currency}}{{if .Expense}}{{$sel = .Expense.Currency}}{{end}}
        <option value="MYR" {{if eq $sel "MYR"}}selected{{end}}>Malaysian Ringgit (RM)</option>
        <option value="USD" {{if eq $sel "USD"}}selected{{end}}>US Dollar ($)</option>
        <option value="JPY" {{if eq $sel "JPY"}}selected{{end}}>Japanese Yen (¥)</option>
        <option value="CNY" {{if eq $sel "CNY"}}selected{{end}}>Chinese Yuan (¥)</option>
        <option value="THB" {{if eq $sel "THB"}}selected{{end}}>Thai Baht (฿)</option>
        <option value="EUR" {{if eq $sel "EUR"}}selected{{end}}>Euro (€)</option>
        <option value="GBP" {{if eq $sel "GBP"}}selected{{end}}>British Pound (£)</option>
        <option value="SGD" {{if eq $sel "SGD"}}selected{{end}}>Singapore Dollar (S$)</option>
        <option value="KRW" {{if eq $sel "KRW"}}selected{{end}}>South Korean Won (₩)</option>
        <option value="AUD" {{if eq $sel "AUD"}}selected{{end}}>Australian Dollar (A$)</option>
        <option value="CAD" {{if eq $sel "CAD"}}selected{{end}}>Canadian Dollar (C$)</option>
        <option value="INR" {{if eq $sel "INR"}}selected{{end}}>Indian Rupee (₹)</option>
        <option value="VND" {{if eq $sel "VND"}}selected{{end}}>Vietnamese Dong (₫)</option>
        <option value="PHP" {{if eq $sel "PHP"}}selected{{end}}>Philippine Peso (₱)</option>
        <option value="IDR" {{if eq $sel "IDR"}}selected{{end}}>Indonesian Rupiah (Rp)</option>
        <option value="HKD" {{if eq $sel "HKD"}}selected{{end}}>Hong Kong Dollar (HK$)</option>
        <option value="TWD" {{if eq $sel "TWD"}}selected{{end}}>New Taiwan Dollar (NT$)</option>
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
      <input type="date" name="date" value="{{if .Expense}}{{.Expense.Date}}{{else}}{{.Today}}{{end}}"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Paid By</label>
      <select name="paid_by_id" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
        <option value="0">-- None --</option>
        {{$paidByID := .PaidByID}}{{if .Expense}}{{$paidByID = .Expense.PaidByID}}{{end}}
        {{range .Users}}
        <option value="{{.ID}}" {{if eq $paidByID .ID}}selected{{end}}>{{.Name}}</option>
        {{end}}
      </select>
    </div>
    <div class="flex gap-3 pt-2">
      <a href="/" class="flex-1 text-center bg-gray-200 text-gray-700 font-medium py-2.5 rounded-lg hover:bg-gray-300 transition">
        Cancel
      </a>
      <button type="submit" name="action" value="save" class="flex-1 bg-blue-600 text-white font-medium py-2.5 rounded-lg hover:bg-blue-700 transition">
        {{.SubmitLabel}}
      </button>
      {{if .IsAdd}}
      <button type="submit" name="action" value="another" class="flex-1 bg-blue-500 text-white font-medium py-2.5 rounded-lg hover:bg-blue-600 transition">
        Create & add another
      </button>
      {{end}}
    </div>
  </div>
</div>
{{end}}
